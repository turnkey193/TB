<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>統包先生 - 週會管理系統</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    /* html/body 強制不水平溢出。這個寫法不會破壞內部 position:sticky，
       而且不依賴 overflow:clip（舊版 iOS Safari < 16 不支援）。 */
    html, body { overflow-x: hidden; max-width: 100vw; }
    body { font-family: 'Microsoft JhengHei', 'PingFang TC', sans-serif; background: #f0f2f5; }

    /* ===== 手機版（< 768px）樣式調整：縮小 padding、字體，避免重疊與換行 ===== */
    @media (max-width: 767px) {
      .block-header { padding: 12px 14px !important; gap: 10px !important; }
      .block-body { padding: 16px 12px !important; }
      .tb-th { padding: 7px 6px !important; font-size: 9px !important; letter-spacing: 0.04em !important; }
      .tb-td { padding: 8px 6px !important; font-size: 12px !important; }
      .metric-card { padding: 12px 14px !important; flex: 1 1 140px !important; min-width: 120px !important; }
      .metric-card > div:last-child { font-size: 22px !important; }
    }

    /* 更小螢幕（< 480px）再緊一點 */
    @media (max-width: 479px) {
      .block-header { padding: 10px 12px !important; gap: 8px !important; }
      .block-body { padding: 14px 10px !important; }
      .tb-th { padding: 6px 4px !important; }
      .tb-td { padding: 7px 4px !important; font-size: 11px !important; }
      .metric-card > div:last-child { font-size: 20px !important; }
    }

    /* ===== 手機版通用：表格轉卡片佈局、標題縮小、指定兩欄堆疊 ===== */
    @media (max-width: 767px) {
      /* 表格徹底改為卡片佈局：每一 row 一張卡、每個 cell 垂直排列 */
      .block-body table {
        display: block;
        width: 100% !important;
        min-width: 0 !important;
        border-collapse: collapse;
      }
      .block-body thead { display: none; }
      .block-body tbody { display: block; }
      .block-body tr {
        display: block;
        padding: 10px 12px;
        background: #fff;
        border: 1px solid #e8e4dc;
        border-radius: 4px;
        margin-bottom: 8px;
      }
      /* 卡片外框：overflow hidden 把任何溢出內容 clip 在卡片內 */
      .block-body tr {
        overflow: hidden;
      }
      /* 用 Grid（非 Flex）才能用 minmax(0,1fr) 保證 value 欄可以縮到 0
         避免 Safari 的 flex-shrink + min-content 行為讓值欄撐破卡片 */
      .tb-td {
        display: grid !important;
        grid-template-columns: 72px minmax(0, 1fr);
        align-items: baseline;
        gap: 10px;
        border: none !important;
        padding: 5px 0 !important;
        max-width: 100% !important;
        min-width: 0;
        word-break: break-word;
        overflow-wrap: anywhere;
        font-size: 13px !important;
      }
      /* 每列開頭用 pseudo 元素顯示欄位名稱（透過 data-label） */
      .tb-td[data-label]::before {
        content: attr(data-label);
        font-weight: 700;
        font-size: 10px;
        letter-spacing: 0.06em;
        color: #8a8581;
        text-transform: uppercase;
        padding-top: 2px;
      }
      /* 沒有 data-label 的 cell（例如純按鈕列）：改成單欄 grid，讓內容滿寬 */
      .tb-td:not([data-label]) {
        grid-template-columns: 1fr !important;
        padding-top: 8px !important;
        padding-bottom: 2px !important;
      }
      /* 讓有 data-label 空值的 cell 仍保留標籤 + "—" 顯示 */
      .tb-td[data-label]:empty::after { content: "—"; color: #c8c3bd; }
      /* 所有 cell 直接子元素：限寬、容許縮 */
      .tb-td > *, .tb-td > * * {
        max-width: 100% !important;
        min-width: 0;
      }
      /* 長文字欄位（帶 inline max-width 的 div）改成水平滑動：單行顯示、超出可左右滑 */
      .tb-td > div[style*="max-width"] {
        max-width: 100% !important;
        white-space: nowrap !important;
        overflow-x: auto !important;
        overflow-y: hidden !important;
        overflow-wrap: normal !important;
        word-break: normal !important;
        -webkit-overflow-scrolling: touch;
        /* 滾動條樣式做精緻一點 */
        scrollbar-width: thin;
      }
      .tb-td > div[style*="max-width"]::-webkit-scrollbar {
        height: 4px;
      }
      .tb-td > div[style*="max-width"]::-webkit-scrollbar-thumb {
        background: #d8d3cc;
        border-radius: 2px;
      }
      /* 所有 input/textarea/select（含 number 等）全部撐滿卡片，不保留固定寬 */
      .tb-td input, .tb-td textarea, .tb-td select {
        width: 100% !important;
        max-width: 100% !important;
        min-width: 0 !important;
        box-sizing: border-box;
      }
      /* 真正的空 cell（沒 data-label 也沒內容）直接隱藏 */
      .tb-td:not([data-label]):empty { display: none !important; }

      /* 標題列的品牌字縮小、避免被擠出螢幕 */
      .tb-brand { font-size: 14px !important; }

      /* 特定區塊加 stack-on-mobile 會強制上下堆疊 */
      .stack-on-mobile { flex-direction: column !important; flex-wrap: nowrap !important; }
      .stack-on-mobile > * { flex: 1 1 auto !important; width: 100% !important; max-width: 100% !important; min-width: 0 !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
